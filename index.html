<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCanvas | Full Coding Bootcamp</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- PrismJS (Syntax Highlighting) - Dracula Theme -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-dracula.min.css" rel="stylesheet" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="particles-bg"></div>
    <div class="app-container" id="app">
        <!-- Main content injected by JS -->
    </div>

    <!-- Auth Modal / Overlay -->
    <div id="auth-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-modal-btn" id="close-modal"><i class="ph-bold ph-x"></i></button>
            <div class="modal-header">
                <i class="ph-bold ph-user-circle auth-icon"></i>
                <h2>Welcome Back</h2>
                <p>Log in to access the full coding curriculum.</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter 'admin' or any name" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Test Password: 1234" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Unlock Courses <i class="ph-bold ph-lock-key-open"></i></button>
            </form>

            <div style="text-align: center; margin: 1.5rem 0; color: var(--text-secondary); font-size: 0.875rem;">
                &mdash; OR &mdash;
            </div>

            <!-- Google Sign-In Button Container -->
            <div id="google-btn-container" style="display: flex; justify-content: center;"></div>
            
            <div class="modal-footer">
                <p>Need an account? <a href="#" class="highlight">Sign up instantly</a></p>
                <div class="test-creds">Test User: <strong>admin</strong> | Pass: <strong>1234</strong></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
