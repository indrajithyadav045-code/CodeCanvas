<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCanvas | Full Coding Bootcamp</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Identity Services (OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- PrismJS (Syntax Highlighting) - Dracula Theme -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-dracula.min.css" rel="stylesheet" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="particles-bg"></div>
    <div class="app-container" id="app">
        <!-- Main content injected by JS -->
    </div>

    <!-- Auth Modal / Overlay -->
    <div id="auth-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-modal-btn" id="close-modal"><i class="ph-bold ph-x"></i></button>
            <div class="modal-header">
                <i class="ph-bold ph-user-circle auth-icon"></i>
                <h2>Welcome Back</h2>
                <p>Log in to access the full coding curriculum.</p>
            </div>
            
            <!-- Google Sign-In Button Container -->
            <div id="google-btn-container" style="display: flex; justify-content: center; margin: 2rem 0;"></div>
            
            <div class="modal-footer">
                <p>Please sign in with Google to access the curriculum.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
